<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piyush Tech Notes</title>
  <style>
    body {
      margin: 0;
      font-family: Verdana, sans-serif;
      background-color: grey;   /* Black background */
      color: #fff;        /* White text */
    }

    /* Header */
    .header {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .header h1 {
      margin: 0;
      color: #00ffcc; /* Teal main title */
    }
    .header p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #ccc;
    }

    /* Content */
    .content {
      text-align: center;
      padding: 60px 20px;
    }
    .content h2 {
      color: #00ffcc;
      margin-bottom: 10px;
    }
    .content p {
      font-size: 18px;
      margin-bottom: 20px;
    }
    .content img {
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0px 0px 15px rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>PIYUSH TECH NOTES</h1>
    <p>Kubernetes | Linux | DevOps</p>
  </div>

  <!-- Content -->
  <div class="content">
    <h2>Welcome to Piyush Tech Notes</h2>
    <p>Select a topic from the left menu to begin.</p>
    <img src="welcome.gif" alt="Welcome">
  </div>

</body>
</html>
